{% extends "base.html" %}

{% block title %}Error - Zarch Hub{% endblock %}

{% block content %}
<div class="error-container" data-aos="fade-up">
    <div class="error-content">
        <i class="fas fa-exclamation-triangle fa-4x" style="color: var(--danger);"></i>
        <h1>Internal Server Error</h1>
        <p>Something went wrong. Our team has been notified.</p>
        {% if error %}
        <div class="error-details glass-effect">
            <pre>{{ error }}</pre>
        </div>
        {% endif %}
        <div class="error-actions">
            <a href="/" class="btn-primary">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="/packages" class="btn-secondary">
                <i class="fas fa-box"></i> Browse Packages
            </a>
        </div>
    </div>
</div>

<style>
.error-details {
    margin: 2rem auto;
    padding: 1rem;
    max-width: 600px;
    overflow-x: auto;
    border-radius: var(--radius-lg);
    text-align: left;
}

.error-details pre {
    margin: 0;
    color: var(--danger);
    font-size: 0.9rem;
}
</style>
{% endblock %}
