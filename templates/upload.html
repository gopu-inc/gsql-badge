{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-12">
    <div class="bg-surface rounded-2xl border border-gray-700 p-8 shadow-2xl">
        <div class="flex items-center gap-4 mb-8 pb-6 border-b border-gray-700">
            <div class="bg-primary/10 p-3 rounded-lg text-primary">
                <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-white">Publier un paquet</h1>
                <p class="text-gray-400 text-sm">Rendez votre code accessible à la communauté</p>
            </div>
        </div>

        <form id="uploadForm" class="space-y-6">
            <!-- Basic Info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Scope <span class="text-xs text-gray-500">(optionnel)</span></label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">@</span>
                        <input type="text" name="scope" value="global" class="w-full bg-darker border border-gray-600 rounded-lg py-3 pl-8 pr-4 text-white focus:border-primary outline-none font-mono">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Nom du paquet *</label>
                    <input type="text" name="name" required placeholder="mathlib" class="w-full bg-darker border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-primary outline-none font-mono">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Version *</label>
                <input type="text" name="version" required placeholder="1.0.0" class="w-full bg-darker border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-primary outline-none font-mono">
                <p class="text-xs text-gray-500 mt-1">Format SemVer recommandé (ex: 1.0.0)</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Description courte</label>
                <textarea name="description" rows="2" class="w-full bg-darker border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-primary outline-none resize-none"></textarea>
            </div>

            <!-- Security Code -->
            <div class="bg-darker/50 p-4 rounded-xl border border-gray-700">
                <label class="block text-sm font-medium text-gray-300 mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-primary"></i> Code Personnel *
                </label>
                <input type="password" name="personal_code" required placeholder="Votre code secret reçu à l'inscription" class="w-full bg-darker border border-gray-600 rounded-lg px-4 py-3 text-white focus:border-primary outline-none">
            </div>

            <!-- File Upload -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Archive du paquet (.tar.gz) *</label>
                <div id="dropZone" class="border-2 border-dashed border-gray-600 rounded-xl p-10 text-center hover:border-primary hover:bg-primary/5 transition cursor-pointer relative">
                    <input type="file" id="fileInput" name="file" accept=".tar.gz" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required>
                    
                    <div id="dropContent">
                        <i class="fa-solid fa-file-zipper text-4xl text-gray-500 mb-4"></i>
                        <p class="text-gray-300 font-medium">Glissez votre fichier ici ou cliquez</p>
                        <p class="text-sm text-gray-500 mt-2">Doit contenir un fichier zarch.json à la racine</p>
                    </div>
                    
                    <div id="fileSelected" class="hidden">
                        <i class="fa-solid fa-check-circle text-4xl text-green-500 mb-3"></i>
                        <p id="fileName" class="text-white font-mono font-bold text-lg"></p>
                        <p class="text-sm text-gray-400 mt-1">Fichier prêt à l'envoi</p>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-4 rounded-xl transition transform hover:scale-[1.01] shadow-xl shadow-cyan-500/20 flex items-center justify-center gap-2">
                <span>Publier maintenant</span>
                <i class="fa-solid fa-rocket"></i>
            </button>
        </form>
    </div>
</div>

<script>
    // Drag & Drop Logic
    const fileInput = document.getElementById('fileInput');
    const dropContent = document.getElementById('dropContent');
    const fileSelected = document.getElementById('fileSelected');
    const fileName = document.getElementById('fileName');

    fileInput.addEventListener('change', function() {
        if (this.files[0]) {
            dropContent.classList.add('hidden');
            fileSelected.classList.remove('hidden');
            fileName.textContent = this.files[0].name;
        }
    });

    // Form Submission
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = localStorage.getItem('zarch_token');
        
        if (!token) {
            alert("Session expirée. Veuillez vous reconnecter.");
            window.location.href = '/login';
            return;
        }

        const btn = e.target.querySelector('button');
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xl"></i> Upload en cours...';
        btn.disabled = true;

        const formData = new FormData(e.target);
        const scope = formData.get('scope') || 'global';
        const name = formData.get('name');

        try {
            const res = await fetch(`/api/package/upload/${scope}/${name}`, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token
                },
                body: formData
            });
            
            const data = await res.json();
            if (data.success) {
                // Success Animation / Redirect
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Succès !';
                btn.classList.replace('from-cyan-500', 'from-green-500');
                btn.classList.replace('to-blue-500', 'to-green-600');
                
                setTimeout(() => {
                    window.location.href = `/package/${scope}/${name}`;
                }, 1000);
            } else {
                alert("Erreur: " + data.error);
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        } catch (err) {
            alert("Erreur réseau");
            btn.innerHTML = originalContent;
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
