{% extends "base.html" %}

{% block title %}Upload Package - Zarch Hub{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">
    <div class="glass-card rounded-2xl p-8" data-aos="fade-up">
        <h1 class="text-3xl font-bold text-center mb-8 bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">
            Upload Package
        </h1>
        
        <form id="uploadForm" class="space-y-6">
            <!-- Package Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Package Name
                </label>
                <input type="text" id="name" required
                       class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-800"
                       placeholder="e.g., my-package">
            </div>
            
            <!-- Version -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Version
                </label>
                <input type="text" id="version" required
                       class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-800"
                       placeholder="1.0.0">
            </div>
            
            <!-- Release -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Release
                </label>
                <input type="text" id="release" value="r0"
                       class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-800">
            </div>
            
            <!-- Architecture -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Architecture
                </label>
                <select id="arch" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-800">
                    <option value="x86_64">x86_64</option>
                    <option value="i386">i386</option>
                    <option value="arm64">arm64</option>
                    <option value="armv7">armv7</option>
                </select>
            </div>
            
            <!-- Scope -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Scope
                </label>
                <select id="scope" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-800">
                    <option value="public">Public</option>
                    <option value="private">Private</option>
                </select>
            </div>
            
            <!-- Description -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Description
                </label>
                <textarea id="description" rows="3"
                          class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-800"
                          placeholder="Short description of your package"></textarea>
            </div>
            
            <!-- License -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    License
                </label>
                <input type="text" id="license" value="MIT"
                       class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-800">
            </div>
            
            <!-- File Upload -->
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Package File (.tar.bool)
                </label>
                <input type="file" id="file" accept=".tar.bool" required
                       class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-purple-600 file:text-white hover:file:bg-purple-700">
            </div>
            
            <!-- Submit -->
            <button type="submit" 
                    class="w-full px-6 py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl font-semibold hover:from-purple-700 hover:to-pink-700 transition transform hover:scale-105">
                <i class="fas fa-cloud-upload-alt mr-2"></i>
                Upload Package
            </button>
        </form>
        
        <div id="message" class="mt-4 text-center hidden"></div>
    </div>
</div>

<script>
const token = localStorage.getItem('zarch_token');
if (!token) {
    window.location.href = '/login';
}

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = new FormData();
    formData.append('name', document.getElementById('name').value);
    formData.append('version', document.getElementById('version').value);
    formData.append('release', document.getElementById('release').value);
    formData.append('arch', document.getElementById('arch').value);
    formData.append('scope', document.getElementById('scope').value);
    formData.append('description', document.getElementById('description').value);
    formData.append('license', document.getElementById('license').value);
    formData.append('file', document.getElementById('file').files[0]);
    
    const msg = document.getElementById('message');
    msg.classList.remove('hidden', 'text-green-600', 'text-red-600');
    msg.textContent = 'Uploading...';
    msg.classList.add('text-purple-600');
    
    try {
        // 1. Créer le package
        const pkgRes = await fetch('/v6/packages', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                name: document.getElementById('name').value,
                version: document.getElementById('version').value,
                release: document.getElementById('release').value,
                arch: document.getElementById('arch').value,
                scope: document.getElementById('scope').value,
                description: document.getElementById('description').value,
                license: document.getElementById('license').value,
                author: '{{ user.username }}'
            })
        });
        
        const pkgData = await pkgRes.json();
        if (!pkgRes.ok) throw new Error(pkgData.error);
        
        // 2. Uploader le fichier
        const fileRes = await fetch(`/v6/packages/${document.getElementById('name').value}/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        
        const fileData = await fileRes.json();
        if (!fileRes.ok) throw new Error(fileData.error);
        
        msg.textContent = '✅ Package uploaded successfully!';
        msg.classList.add('text-green-600');
        setTimeout(() => window.location.href = `/package/${document.getElementById('name').value}`, 2000);
    } catch (err) {
        msg.textContent = `❌ Error: ${err.message}`;
        msg.classList.add('text-red-600');
    }
});
</script>
{% endblock %}
