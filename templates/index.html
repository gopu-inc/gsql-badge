{% extends "base.html" %}

{% block title %}GSQL Badges{% endblock %}

{% block content %}

<section class="card">
  <h2>🎖️ Badge officiel</h2>

  <img src="/badge" alt="Badge officiel GSQL" class="badge-preview">

  <pre class="code">
![GSQL](https://gsql-badge.onrender.com/badge)
  </pre>
</section>

<section class="card">
  <h2>🧩 Créer ton badge</h2>

  <input type="file" id="file" accept="image/*" class="file-input">

  <button onclick="upload()" class="btn">
    Générer le badge
  </button>

  <div id="result" class="result"></div>
</section>

{% endblock %}
