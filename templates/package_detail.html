{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-6 py-12">
    <div class="flex flex-col md:flex-row gap-12">
        
        <aside class="w-full md:w-1/4 space-y-6">
            <div class="bg-zinc-900 p-6 rounded border border-zinc-800">
                <h1 class="text-2xl font-bold text-white break-words">{{ package.name }}</h1>
                <p class="text-green-500 text-sm mt-1">v{{ package.version }}</p>
                
                <div class="mt-6">
                    <label class="text-xs text-zinc-500 uppercase">Install</label>
                    <div class="flex mt-1 bg-black border border-zinc-700 rounded overflow-hidden">
                        <code class="p-2 text-xs text-green-400 flex-grow">zarch i {{ package.name }}</code>
                        <button class="px-3 bg-zinc-800 hover:bg-zinc-700 text-white"><i data-lucide="copy" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>

            <div class="text-sm text-zinc-400 space-y-2">
                <div class="flex justify-between"><span>Author</span> <span class="text-white">{{ package.author }}</span></div>
                <div class="flex justify-between"><span>License</span> <span class="text-white">MIT</span></div>
                <div class="flex justify-between"><span>Size</span> <span class="text-white">{{ package.size }} bytes</span></div>
            </div>
        </aside>

        <div class="w-full md:w-3/4">
            <div class="bg-[#0e0e0e] border border-zinc-800 p-8 rounded min-h-[500px]">
                <h3 class="text-xl font-bold mb-6 border-b border-zinc-800 pb-4">Documentation</h3>
                <div class="prose prose-invert max-w-none">
                    {{ readme_content | safe }}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
