{% extends "base.html" %}

{% block title %}Register - Zarch Hub{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center p-4">
    <div class="glass-card rounded-3xl p-8 md:p-12 max-w-md w-full" data-aos="fade-up">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl mb-4 animate-float">
                <i class="fas fa-user-plus text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-2">
                Create Account
            </h1>
            <p class="text-gray-600 dark:text-gray-400">Join the Zarch Hub community</p>
        </div>

        <div id="errorMessage" class="mb-4 hidden animate-slide-in">
            <div class="bg-red-50 dark:bg-red-900/20 border-l-4 border-red-500 rounded-lg p-3">
                <p class="text-red-700 dark:text-red-300 text-sm" id="errorText"></p>
            </div>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Username</label>
                <input type="text" id="username" required minlength="3"
                       class="w-full px-4 py-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition bg-white dark:bg-gray-800"
                       placeholder="Choose a username">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition bg-white dark:bg-gray-800"
                       placeholder="your@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
                <input type="password" id="password" required minlength="8"
                       class="w-full px-4 py-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 transition bg-white dark:bg-gray-800"
                       placeholder="Create a password">
                <p class="text-xs text-gray-500 mt-1">Minimum 8 characters, 1 uppercase, 1 number</p>
            </div>

            <div>
                <label class="flex items-center">
                    <input type="checkbox" id="terms" required class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
                    <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">
                        I agree to the <a href="/terms" class="text-purple-600 hover:text-purple-700">Terms</a> and 
                        <a href="/privacy" class="text-purple-600 hover:text-purple-700">Privacy Policy</a>
                    </span>
                </label>
            </div>

            <button type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl font-semibold hover:from-purple-700 hover:to-pink-700 transition transform hover:scale-105"
                    id="submitBtn" disabled>
                <span class="btn-text">Create Account</span>
                <span class="btn-loader hidden"><i class="fas fa-spinner fa-spin"></i></span>
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-white dark:bg-gray-800 text-gray-500">Or sign up with</span>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <a href="/auth/discord" class="flex justify-center p-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition">
                <i class="fab fa-discord text-2xl text-indigo-600"></i>
            </a>
            <button onclick="socialLogin('github')" class="flex justify-center p-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl hover:border-gray-900 hover:bg-gray-50 transition">
                <i class="fab fa-github text-2xl text-gray-800 dark:text-white"></i>
            </button>
            <button onclick="socialLogin('google')" class="flex justify-center p-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl hover:border-red-500 hover:bg-red-50 transition">
                <i class="fab fa-google text-2xl text-red-500"></i>
            </button>
        </div>

        <p class="text-center text-gray-600 dark:text-gray-400 mt-6">
            Already have an account? 
            <a href="/login" class="text-purple-600 hover:text-purple-700 font-semibold">Sign in</a>
        </p>
    </div>
</div>

<script>
const username = document.getElementById('username');
const email = document.getElementById('email');
const password = document.getElementById('password');
const terms = document.getElementById('terms');
const submitBtn = document.getElementById('submitBtn');

function validateForm() {
    const usernameValid = username.value.length >= 3;
    const emailValid = email.value.includes('@') && email.value.includes('.');
    const passwordValid = password.value.length >= 8 && 
                         /[A-Z]/.test(password.value) && 
                         /[0-9]/.test(password.value);
    const termsValid = terms.checked;
    
    submitBtn.disabled = !(usernameValid && emailValid && passwordValid && termsValid);
}

username.addEventListener('input', validateForm);
email.addEventListener('input', validateForm);
password.addEventListener('input', validateForm);
terms.addEventListener('change', validateForm);

document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    const btnText = submitBtn.querySelector('.btn-text');
    const btnLoader = submitBtn.querySelector('.btn-loader');
    const errorMsg = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    
    btnText.classList.add('hidden');
    btnLoader.classList.remove('hidden');
    submitBtn.disabled = true;
    errorMsg.classList.add('hidden');
    
    try {
        const res = await fetch('/v6/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: username.value,
                email: email.value,
                password: password.value
            })
        });
        
        const data = await res.json();
        
        if (data.success) {
            localStorage.setItem('zarch_token', data.token);
            localStorage.setItem('zarch_user', JSON.stringify(data.user));
            window.location.href = '/dashboard';
        } else {
            errorText.textContent = data.error || 'Registration failed';
            errorMsg.classList.remove('hidden');
            btnText.classList.remove('hidden');
            btnLoader.classList.add('hidden');
            submitBtn.disabled = false;
        }
    } catch (err) {
        errorText.textContent = 'Network error';
        errorMsg.classList.remove('hidden');
        btnText.classList.remove('hidden');
        btnLoader.classList.add('hidden');
        submitBtn.disabled = false;
    }
});

function socialLogin(provider) {
    alert(`${provider} registration coming soon!`);
}
</script>
{% endblock %}
