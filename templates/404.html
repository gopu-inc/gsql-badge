
{% extends "base.html" %}

{% block title %}Page Not Found - Zarch Hub{% endblock %}

{% block content %}
<div class="error-container" data-aos="fade-up">
    <div class="error-content">
        <i class="fas fa-cubes fa-4x" style="color: var(--primary);"></i>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <div class="error-actions">
            <a href="/" class="btn-primary">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="/packages" class="btn-secondary">
                <i class="fas fa-box"></i> Browse Packages
            </a>
        </div>
    </div>
</div>

<style>
.error-container {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
}

.error-content i {
    margin-bottom: 1rem;
    animation: float 3s ease-in-out infinite;
}

.error-content h1 {
    font-size: 6rem;
    font-weight: 800;
    background: var(--gradient-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
}

.error-content h2 {
    font-size: 2rem;
    margin-bottom: 1rem;
}

.error-content p {
    color: var(--gray);
    margin-bottom: 2rem;
    max-width: 500px;
}

.error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
}
</style>
{% endblock %}
