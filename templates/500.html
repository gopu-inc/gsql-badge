{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="text-center max-w-2xl" data-aos="fade-up">
        <div class="relative mb-8">
            <div class="w-24 h-24 mx-auto bg-gradient-to-br from-red-100 to-orange-100 dark:from-red-900/30 dark:to-orange-900/30 rounded-full flex items-center justify-center animate-pulse">
                <i class="fas fa-exclamation-triangle text-4xl text-red-600 dark:text-red-400"></i>
            </div>
            <div class="absolute -top-2 -right-2 w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white text-sm font-bold animate-bounce">
                500
            </div>
        </div>

        <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-red-600 to-orange-600 bg-clip-text text-transparent mb-4">
            Server Error
        </h1>
        
        <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
            Oops! Something went wrong. Our team has been notified.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl font-semibold hover:from-purple-700 hover:to-pink-700 transition hover:scale-105">
                <i class="fas fa-home mr-2"></i>Go Home
            </a>
            <button onclick="location.reload()" class="px-6 py-3 glass-card text-gray-900 dark:text-white rounded-xl font-semibold hover:bg-white/30 transition hover:scale-105">
                <i class="fas fa-sync-alt mr-2"></i>Try Again
            </button>
        </div>
    </div>
</div>
{% endblock %}
