
{% extends "base.html" %}

{% block title %}Connexion - Zarch Hub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center" data-aos="fade-up">
    <div class="w-full max-w-md">
        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-sky-500 to-sky-400 rounded-2xl mb-4 shadow-lg shadow-sky-500/20 animate-float">
                <i class="fas fa-layer-group text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Zarch Hub <span class="text-sky-400">v5.2</span></h1>
            <p class="text-slate-400 mt-2">Access your package registry</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card p-8 rounded-3xl border border-slate-700/50">
            <form id="loginForm" class="space-y-6">
                <!-- Alert Box -->
                <div id="alertBox" class="hidden p-4 rounded-xl border flex items-start gap-3"></div>

                <div class="input-group">
                    <label class="block text-sm font-medium text-slate-300 mb-2 ml-1">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="username" name="username" required
                            class="block w-full pl-11 pr-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500 transition-all"
                            placeholder="Enter username">
                    </div>
                </div>

                <div class="input-group">
                    <div class="flex justify-between mb-2 ml-1">
                        <label class="text-sm font-medium text-slate-300">Password</label>
                        <a href="#" class="text-xs text-sky-400 hover:text-sky-300">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" required
                            class="block w-full pl-11 pr-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500 transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                        class="h-4 w-4 text-sky-500 focus:ring-sky-500 border-slate-700 rounded bg-slate-900">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-400">Remember me</label>
                </div>

                <button type="submit" id="submitBtn"
                    class="glow-button w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-gradient-to-r from-sky-500 to-sky-400 hover:from-sky-600 hover:to-sky-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btnText">Sign In</span>
                    <i id="loadingIcon" class="hidden fas fa-circle-notch fa-spin ml-2"></i>
                </button>
            </form>

            <!-- Social Login -->
            <div class="mt-8">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-slate-800/50 text-slate-400 rounded-full">Or continue with</span>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-3 gap-3">
                    <a href="{{ url_for('auth_discord') }}" 
                       class="flex justify-center py-3 px-4 bg-slate-800/50 border border-slate-700 rounded-xl hover:bg-sky-500/10 hover:border-sky-500/50 transition-all group">
                        <i class="fab fa-discord text-2xl text-slate-400 group-hover:text-sky-400"></i>
                    </a>
                    <a href="#" 
                       class="flex justify-center py-3 px-4 bg-slate-800/50 border border-slate-700 rounded-xl hover:bg-sky-500/10 hover:border-sky-500/50 transition-all group">
                        <i class="fab fa-github text-2xl text-slate-400 group-hover:text-sky-400"></i>
                    </a>
                    <a href="#" 
                       class="flex justify-center py-3 px-4 bg-slate-800/50 border border-slate-700 rounded-xl hover:bg-sky-500/10 hover:border-sky-500/50 transition-all group">
                        <i class="fab fa-google text-2xl text-slate-400 group-hover:text-sky-400"></i>
                    </a>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-800 text-center">
                <p class="text-sm text-slate-400">
                    Don't have an account? 
                    <a href="/register" class="font-medium text-sky-400 hover:text-sky-300">Create one</a>
                </p>
            </div>
        </div>

        <!-- Demo Credentials -->
        <div class="mt-6 text-center">
            <p class="text-xs text-slate-500">
                <i class="fas fa-info-circle mr-1"></i>
                Demo: username: <span class="text-sky-400">demo</span> | password: <span class="text-sky-400">demo123</span>
            </p>
        </div>
    </div>
</div>

<script>
const loginForm = document.getElementById('loginForm');
const alertBox = document.getElementById('alertBox');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const loadingIcon = document.getElementById('loadingIcon');

function showAlert(message, type = 'error') {
    alertBox.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/50', 'text-red-400', 'bg-green-500/10', 'border-green-500/50', 'text-green-400');
    
    if (type === 'error') {
        alertBox.classList.add('bg-red-500/10', 'border-red-500/50', 'text-red-400');
        alertBox.innerHTML = `<i class="fas fa-exclamation-circle mt-0.5"></i><span>${message}</span>`;
    } else {
        alertBox.classList.add('bg-green-500/10', 'border-green-500/50', 'text-green-400');
        alertBox.innerHTML = `<i class="fas fa-check-circle mt-0.5"></i><span>${message}</span>`;
    }
}

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    submitBtn.disabled = true;
    btnText.textContent = "Authenticating...";
    loadingIcon.classList.remove('hidden');
    alertBox.classList.add('hidden');

    const formData = new FormData(loginForm);
    const data = Object.fromEntries(formData.entries());

    try {
        const response = await fetch('/v5.2/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            showAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => window.location.href = '/dashboard', 1000);
        } else {
            showAlert(result.error || 'Invalid credentials');
            submitBtn.disabled = false;
            btnText.textContent = "Sign In";
            loadingIcon.classList.add('hidden');
        }
    } catch (error) {
        showAlert('Connection error');
        submitBtn.disabled = false;
        btnText.textContent = "Sign In";
        loadingIcon.classList.add('hidden');
    }
});
</script>
{% endblock %}
