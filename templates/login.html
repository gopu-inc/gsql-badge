{% extends "base.html" %}

{% block title %}Login - Zarch Hub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center fade-in">
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <img src="https://raw.githubusercontent.com/gopu-inc/gsql-badge/main/images/icon.png" 
                 alt="Zarch Hub" 
                 class="h-20 w-auto mx-auto mb-4 rounded-2xl">
            <h1 class="text-3xl font-bold">
                <span class="bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">
                    Welcome Back
                </span>
            </h1>
            <p class="text-gray-600 dark:text-gray-400 mt-2">Sign in to continue to Zarch Hub</p>
        </div>
        
        <!-- Login Form -->
        <div class="glass-card p-8">
            <form method="POST" action="/api/v5.4/auth/login" id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" 
                               name="username" 
                               required 
                               class="w-full pl-10 pr-4 py-3 rounded-lg glass-card border-0 focus:ring-2 focus:ring-purple-600 outline-none"
                               placeholder="Enter your username">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" 
                               name="password" 
                               required 
                               class="w-full pl-10 pr-12 py-3 rounded-lg glass-card border-0 focus:ring-2 focus:ring-purple-600 outline-none"
                               placeholder="Enter your password">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" name="remember" class="rounded border-gray-300 text-purple-600 focus:ring-purple-600">
                        <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">Remember me</span>
                    </label>
                    <a href="/forgot-password" class="text-sm text-purple-600 hover:underline">Forgot password?</a>
                </div>
                
                <button type="submit" 
                        class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-lg hover:from-purple-700 hover:to-pink-700 transition font-semibold shadow-lg">
                    <i class="fas fa-sign-in-alt mr-2"></i> Sign In
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">Or continue with</span>
                </div>
            </div>
            
            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-3">
                <a href="/auth/discord" 
                   class="discord-btn text-white p-3 rounded-lg flex items-center justify-center gap-2 transition">
                    <i class="fab fa-discord"></i>
                    <span>Discord</span>
                </a>
                <a href="/auth/github" 
                   class="github-btn text-white p-3 rounded-lg flex items-center justify-center gap-2 transition">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
            </div>
            
            <!-- Register Link -->
            <p class="text-center mt-6 text-sm text-gray-600 dark:text-gray-400">
                Don't have an account? 
                <a href="/register" class="text-purple-600 hover:underline font-semibold">
                    Create one now
                </a>
            </p>
        </div>
        
        <!-- Discord Community -->
        <div class="mt-6 text-center">
            <a href="https://discord.gg/W2xN49q9h" target="_blank" 
               class="inline-flex items-center text-sm text-gray-500 hover:text-purple-600 transition">
                <i class="fab fa-discord mr-2"></i>
                Join our Discord community for help and updates
            </a>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.querySelector('input[name="password"]');
    const icon = document.getElementById('togglePasswordIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

// Handle login form submission
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const data = {
        username: formData.get('username'),
        password: formData.get('password')
    };
    
    try {
        const response = await fetch('/api/v5.4/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (response.ok) {
            window.location.href = '/dashboard';
        } else {
            alert(result.error || 'Login failed');
        }
    } catch (error) {
        alert('Network error. Please try again.');
    }
});
</script>
{% endblock %}
