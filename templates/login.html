{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Connexion
                </h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person me-1"></i>Nom d'utilisateur ou Email
                        </label>
                        <input type="text" 
                               class="form-control" 
                               id="username" 
                               name="username"
                               placeholder="Entrez votre nom d'utilisateur ou email"
                               required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock me-1"></i>Mot de passe
                        </label>
                        <div class="input-group">
                            <input type="password" 
                                   class="form-control" 
                                   id="password" 
                                   name="password"
                                   placeholder="Entrez votre mot de passe"
                                   required>
                            <button class="btn btn-outline-secondary" 
                                    type="button"
                                    onclick="togglePassword('password')">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Se souvenir de moi</label>
                        <a href="#" class="float-end text-decoration-none">
                            Mot de passe oublié ?
                        </a>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-zenv">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Se connecter
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="mb-2">Nouveau sur Zenv Package Hub ?</p>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-primary">
                        <i class="bi bi-person-plus me-1"></i>Créer un compte
                    </a>
                </div>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="small text-muted mb-2">Ou connectez-vous avec</p>
                    <div class="d-flex justify-content-center gap-2">
                        <button class="btn btn-outline-dark" disabled>
                            <i class="bi bi-github me-1"></i>GitHub
                        </button>
                        <button class="btn btn-outline-primary" disabled>
                            <i class="bi bi-google me-1"></i>Google
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card mt-3">
            <div class="card-body text-center">
                <h6>
                    <i class="bi bi-info-circle me-2"></i>Comptes de démonstration
                </h6>
                <div class="alert alert-info small mb-0">
                    <strong>Admin:</strong>secret<br>
                    <strong>Utilisateur:</strong> Créez votre propre compte
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
