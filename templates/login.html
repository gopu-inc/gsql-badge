<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarch Hub - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-group:focus-within label {
            color: #38bdf8;
        }
        .glow-button {
            transition: all 0.3s ease;
            box-shadow: 0 0 0 rgba(56, 189, 248, 0);
        }
        .glow-button:hover {
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-sky-500 rounded-2xl mb-4 shadow-lg shadow-sky-500/20">
                <i class="fas fa-layer-group text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Zarch Hub <span class="text-sky-400">v5.2</span></h1>
            <p class="text-slate-400 mt-2">Accédez à votre gestionnaire de packages</p>
        </div>

        <!-- Form Card -->
        <div class="glass-card p-8 rounded-3xl shadow-2xl">
            <form id="loginForm" class="space-y-6">
                <!-- Message d'alerte (caché par défaut) -->
                <div id="alertBox" class="hidden p-4 rounded-xl text-sm border flex items-start gap-3">
                    <i id="alertIcon" class="fas mt-0.5"></i>
                    <span id="alertMessage"></span>
                </div>

                <div class="input-group">
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-2 ml-1 transition-colors">Nom d'utilisateur</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="username" name="username" required
                            class="block w-full pl-11 pr-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500 transition-all"
                            placeholder="Ex: admin_zarch">
                    </div>
                </div>

                <div class="input-group">
                    <div class="flex justify-between mb-2 ml-1">
                        <label for="password" class="block text-sm font-medium text-slate-300 transition-colors">Mot de passe</label>
                        <a href="#" class="text-xs text-sky-400 hover:text-sky-300">Oublié ?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" required
                            class="block w-full pl-11 pr-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/50 focus:border-sky-500 transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                        class="h-4 w-4 text-sky-500 focus:ring-sky-500 border-slate-700 rounded bg-slate-900">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-400">Se souvenir de moi</label>
                </div>

                <button type="submit" id="submitBtn"
                    class="glow-button w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-sky-500 hover:bg-sky-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btnText">Connexion</span>
                    <i id="loadingIcon" class="hidden fas fa-circle-notch fa-spin ml-2"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-800 text-center">
                <p class="text-sm text-slate-400">
                    Pas encore de compte ? 
                    <a href="/register" class="font-medium text-sky-400 hover:text-sky-300">Créer un profil</a>
                </p>
            </div>
        </div>

        <p class="mt-8 text-center text-xs text-slate-500 uppercase tracking-widest font-semibold">
            &copy; 2024 Zarch Hub Systems
        </p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const alertMessage = document.getElementById('alertMessage');
        const alertIcon = document.getElementById('alertIcon');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');

        function showAlert(message, type = 'error') {
            alertBox.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/50', 'text-red-400', 'bg-green-500/10', 'border-green-500/50', 'text-green-400');
            
            if (type === 'error') {
                alertBox.classList.add('bg-red-500/10', 'border-red-500/50', 'text-red-400');
                alertIcon.className = 'fas fa-exclamation-circle mt-0.5';
            } else {
                alertBox.classList.add('bg-green-500/10', 'border-green-500/50', 'text-green-400');
                alertIcon.className = 'fas fa-check-circle mt-0.5';
            }
            
            alertMessage.textContent = message;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // État de chargement
            submitBtn.disabled = true;
            btnText.textContent = "Authentification...";
            loadingIcon.classList.remove('hidden');
            alertBox.classList.add('hidden');

            const formData = new FormData(loginForm);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/v5.2/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Connexion réussie ! Redirection...', 'success');
                    // On attend un peu pour laisser l'utilisateur voir le succès
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    showAlert(result.error || 'Identifiants invalides');
                    submitBtn.disabled = false;
                    btnText.textContent = "Connexion";
                    loadingIcon.classList.add('hidden');
                }

            } catch (error) {
                showAlert('Erreur de communication avec le serveur');
                submitBtn.disabled = false;
                btnText.textContent = "Connexion";
                loadingIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
