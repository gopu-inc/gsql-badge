{% extends "base.html" %}

{% block title %}Settings - Zarch Hub{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold mb-8" data-aos="fade-up">Account Settings</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <!-- Sidebar Navigation -->
        <div class="md:col-span-1" data-aos="fade-up" data-aos-delay="100">
            <div class="glassmorphism rounded-2xl p-4">
                <nav class="space-y-2">
                    <a href="/settings/profile" 
                       class="flex items-center space-x-3 px-4 py-3 rounded-xl {% if request.path == '/settings/profile' %}bg-indigo-600 text-white{% else %}text-gray-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %} transition-colors">
                        <i class="fas fa-user"></i>
                        <span>Profile</span>
                    </a>
                    <a href="/settings/security" 
                       class="flex items-center space-x-3 px-4 py-3 rounded-xl {% if request.path == '/settings/security' %}bg-indigo-600 text-white{% else %}text-gray-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %} transition-colors">
                        <i class="fas fa-shield-alt"></i>
                        <span>Security</span>
                    </a>
                    <a href="/settings/notifications" 
                       class="flex items-center space-x-3 px-4 py-3 rounded-xl {% if request.path == '/settings/notifications' %}bg-indigo-600 text-white{% else %}text-gray-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %} transition-colors">
                        <i class="fas fa-bell"></i>
                        <span>Notifications</span>
                    </a>
                    <a href="/settings/badges" 
                       class="flex items-center space-x-3 px-4 py-3 rounded-xl {% if request.path == '/settings/badges' %}bg-indigo-600 text-white{% else %}text-gray-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %} transition-colors">
                        <i class="fas fa-medal"></i>
                        <span>Badges</span>
                    </a>
                    <a href="/settings/api" 
                       class="flex items-center space-x-3 px-4 py-3 rounded-xl {% if request.path == '/settings/api' %}bg-indigo-600 text-white{% else %}text-gray-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %} transition-colors">
                        <i class="fas fa-key"></i>
                        <span>API Keys</span>
                    </a>
                    <hr class="my-2 border-gray-200">
                    <a href="/settings/danger" 
                       class="flex items-center space-x-3 px-4 py-3 rounded-xl text-red-600 hover:bg-red-50 transition-colors">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span>Danger Zone</span>
                    </a>
                </nav>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="md:col-span-3" data-aos="fade-up" data-aos-delay="150">
            <div class="glassmorphism rounded-2xl p-8">
                {% block settings_content %}{% endblock %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
